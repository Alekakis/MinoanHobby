<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Η πληρωμή ολοκληρώθηκε! - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d1b2a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-box {
            background-color: #0b132b;
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #00ff00;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        i { color: #00ff00; font-size: 50px; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; }
        p { color: #a0a0a0; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="success-box">
        <i class="fas fa-check-circle"></i>
        <h1>Ευχαριστούμε για την Αγορά!</h1>
        <p id="status-text">Η πληρωμή σας ολοκληρώθηκε με επιτυχία. Καταγράφουμε τα στοιχεία της ομάδας σας...</p>
        <a href="products.html" class="btn">Επιστροφή στα Πακέτα</a>
    </div>

    <script>
        async function sendEmailNotification() {
            // Παίρνουμε τα στοιχεία της ομάδας από το localStorage
            const lastOrderCode = localStorage.getItem('last_order_code');
            const selectedTeam = localStorage.getItem('selected_team_name');
            const teamPrice = localStorage.getItem('selected_team_price');

            if (!selectedTeam) {
                document.getElementById('status-text').innerText = "Η πληρωμή ολοκληρώθηκε επιτυχώς!";
                return;
            }

            try {
                // Στέλνουμε τα στοιχεία μέσω Web3Forms
                await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        access_key: "ef54407f-a593-41c3-8fce-209c5ebf6e97",
                        subject: "🔥 Νέα Αγορά Slot στο Euroleague Break!",
                        from_name: "Minoan Hobby System",
                        "Ομάδα που αγοράστηκε": selectedTeam,
                        "Κόστος Slot": teamPrice + " €",
                        "Viva Order Code": lastOrderCode || "Δεν καταγράφηκε"
                    })
                });

                document.getElementById('status-text').innerText = `Το slot για την ομάδα ${selectedTeam} κατοχυρώθηκε επιτυχώς!`;
                
                // Καθαρίζουμε το storage για να μην ξανασταλεί κατά λάθος με refresh
                localStorage.removeItem('selected_team_name');
                localStorage.removeItem('selected_team_price');
            } catch (error) {
                console.error("Web3Forms Error:", error);
                document.getElementById('status-text').innerText = "Η πληρωμή πέτυχε, αλλά υπήρξε θέμα στην καταγραφή. Παρακαλώ επικοινωνήστε μαζί μας.";
            }
        }

        // Εκτέλεση με το που ανοίγει η σελίδα
        sendEmailNotification();
    </script>
</body>
</html>
