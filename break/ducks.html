<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ducks Break - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .right-side-panel a { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: 0.3s; }
        .right-side-panel a:hover { color: #ff0000; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; position: absolute; top: -8px; right: -10px; }

        /* MAIN CONTENT */
        .product-wrapper { max-width: 900px; margin: 50px auto; padding: 20px; }
        .shipping-grid { display: flex; justify-content: center; }
        .shipping-card { background-color: #0b132b; border: 1px solid rgba(255, 0, 0, 0.3); border-radius: 12px; padding: 40px; width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .card-image-container { width: 100%; display: flex; justify-content: center; margin-bottom: 20px; }
        .product-img { max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; }
        .card-title { font-size: 24px; color: #ffffff; margin-bottom: 10px; }
        .card-price { font-size: 28px; color: #ff0000; font-weight: bold; margin-bottom: 10px; }
        .card-desc { color: #cbd5e1; line-height: 1.6; margin-bottom: 20px; }
        
        .stock-indicator { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #ffffff; }
        .stock-indicator.out { color: #ef4444; }
        
        .add-btn { background-color: #ff0000; color: #ffffff; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; }
        .add-btn:hover:not(:disabled) { background-color: #cc0000; }
        .add-btn:disabled { background-color: #475569; cursor: not-allowed; }
        
        .remove-link { display: block; text-align: center; color: #94a3b8; cursor: pointer; margin-top: 10px; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="../checkout.html" class="cart-container" style="position:relative;">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav><a href="../boxesOrder.html">BOXES</a> <a href="../breakOrder.html">BREAKS</a> <a href="../shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a></nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav><a href="../howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a> <a href="../terms.html">ΟΡΟΙ</a> <a href="../newUpdate.html">ΝΕΑ</a></nav>
    </header>

    <main class="product-wrapper">
        <div class="shipping-grid">
            <div class="shipping-card">
                <div>
                    <div class="card-image-container">
                        <img src="../images/ducks.png" alt="Ducks Break" class="product-img">
                    </div>
                    <h2 class="card-title">Ducks Live Break</h2>
                    <div class="card-price">9.99 €</div>
                    <div id="ducks-stock-text" class="stock-indicator">Φόρτωση αποθέματος...</div>
                    <p class="card-desc">Spot 1: Olympiakos | Spot 2: Pao | Spot 3: ASVEL. Μην χάσετε την ευκαιρία!</p>
                </div>
                <div>
                    <button class="add-btn" id="btn-ducks" onclick="addDucksToCart()">Προσθηκη στο καλαθι</button>
                    <div id="remove-ducks-box"></div>
                </div>
            </div>
        </div>
    </main>

  <script>
    async function updatePageState() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
        const badge = document.getElementById('global-cart-count');
        if (badge) badge.innerText = totalItems;

        const ducksInCart = cart.find(item => item.name === 'Ducks');
        const userQty = ducksInCart ? ducksInCart.qty : 0;
        
        const btnDucks = document.getElementById('btn-ducks');
        const stockText = document.getElementById('ducks-stock-text');
        const removeBox = document.getElementById('remove-ducks-box');

        try {
            const response = await fetch('/api/reserve-duck', { method: 'GET' }); 
            const data = await response.json();
            const realLiveStock = data.stock !== undefined ? data.stock : 0;

            if (realLiveStock <= 0) {
                btnDucks.disabled = true;
                btnDucks.innerText = "Εξαντλήθηκε";
                stockText.className = "stock-indicator out";
                stockText.innerText = "❌ Μη διαθέσιμο απόθεμα";
                removeBox.innerHTML = userQty > 0 ? `<span class="remove-link" onclick="removeDucksFromCart()"><i class="fas fa-trash"></i> Αφαίρεση</span>` : "";
            } else if (userQty > 0) {
                btnDucks.disabled = false;
                btnDucks.innerText = `Προσθήκη (+1) | Έχετε: ${userQty}`;
                stockText.innerText = `✔️ Διαθέσιμα: ${realLiveStock}`;
                removeBox.innerHTML = `<span class="remove-link" onclick="removeDucksFromCart()"><i class="fas fa-trash"></i> Αφαίρεση όλων</span>`;
            } else {
                btnDucks.disabled = false;
                btnDucks.innerText = "Προσθηκη στο καλαθι";
                stockText.innerText = `🔥 Live Stock: ${realLiveStock} διαθέσιμα`;
                removeBox.innerHTML = "";
            }
        } catch (error) {
            stockText.innerText = "Σφάλμα φόρτωσης στοκ";
        }
    }

    async function addDucksToCart() {
        const btnDucks = document.getElementById('btn-ducks');
        btnDucks.disabled = true;
        btnDucks.innerText = "Παρακαλώ περιμένετε...";
        
        try {
            const response = await fetch('/api/reserve-duck', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'add' }) 
            });
            if (response.ok) {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                const item = cart.find(i => i.name === 'Ducks');
                item ? item.qty++ : cart.push({ name: 'Ducks', price: 9.99, qty: 1 });
                localStorage.setItem('cart', JSON.stringify(cart));
            } else {
                alert("Το προϊόν εξαντλήθηκε!");
            }
        } catch (e) { alert("Σφάλμα σύνδεσης"); }
        updatePageState();
    }

    async function removeDucksFromCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const item = cart.find(i => i.name === 'Ducks');
        if (!item) return;

        try {
            // Όπως στο Megabox: στέλνουμε τόσα remove όσα και τα κομμάτια στο καλάθι
            for(let i = 0; i < item.qty; i++) {
                await fetch('/api/reserve-duck', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'remove' }) 
                });
            }
            cart = cart.filter(i => i.name !== 'Ducks');
            localStorage.setItem('cart', JSON.stringify(cart));
        } catch (e) { alert("Σφάλμα στην αφαίρεση"); }
        updatePageState();
    }

    window.onload = updatePageState;
</script>
</body>
</html>
