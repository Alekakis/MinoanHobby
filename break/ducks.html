<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ducks Break - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .panel-top { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .right-side-panel a, .right-side-panel .lang-selector { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .right-side-panel a:hover, .right-side-panel .lang-selector:hover { color: #ff0000; transform: scale(1.1); }
        .cart-container { position: relative; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }

        /* PRODUCT PAGE LAYOUT */
        .product-wrapper { max-width: 1000px; margin: 50px auto; padding: 0 20px; display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .product-image-side { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 40px; width: 100%; max-width: 450px; display: flex; justify-content: center; align-items: center; min-height: 350px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .product-image-placeholder { font-size: 80px; color: #ff0000; }
        
        .product-info-side { width: 100%; max-width: 450px; display: flex; flex-direction: column; justify-content: center; }
        .prod-title { font-size: 36px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .prod-price { font-size: 32px; color: #ff0000; font-weight: bold; margin-bottom: 20px; }
        .prod-desc { color: #cbd5e1; font-size: 16px; line-height: 1.6; margin-bottom: 25px; }
        
        .stock-status { font-size: 14px; font-weight: bold; margin-bottom: 20px; padding: 8px 12px; border-radius: 6px; display: inline-block; }
        .status-available { background-color: rgba(34, 197, 94, 0.1); color: #22c55e; border-left: 4px solid #22c55e; }
        .status-empty { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border-left: 4px solid #ef4444; }

        .add-to-cart-btn { background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .add-to-cart-btn:hover:not(:disabled) { background-color: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4); }
        .add-to-cart-btn:disabled { border-color: #475569; color: #64748b; cursor: not-allowed; background-color: rgba(71, 85, 105, 0.1); }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="../checkout.html" title="Καλάθι Αγορών" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector" style="font-size:12px; font-weight:bold; text-align:center;">🇬🇷<br>ΕΛ</div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav class="nav-left">
            <a href="../products.html">ΠΑΚΕΤΑ</a>
            <a href="../index.html">ΑΝΟΙΓΜΑΤΑ</a>
            <a href="../shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav class="nav-right">
            <a href="#">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="../terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
        </nav>
    </header>

    <main class="product-wrapper">
        <div class="product-image-side">
            <div class="product-image-placeholder"><i class="fas fa-box-open"></i></div>
        </div>

        <div class="product-info-side">
            <h1 class="prod-title">Ducks</h1>
            <div class="prod-price">9.99 €</div>
            <p class="prod-desc">Ζήστε την εμπειρία του νέου Ducks Break! Περιορισμένα αποθέματα διαθέσιμα. Κλείστε τη θέση σας τώρα πριν εξαντληθεί το stock.</p>
            
            <div id="stock-badge" class="stock-status status-available">
                <i class="fas fa-check-circle"></i> Διαθέσιμο Stock: <span id="stock-count">--</span>
            </div>

            <button id="add-btn" class="add-to-cart-btn" onclick="tryAddToCart()">Προσθηκη στο καλαθι</button>
        </div>
    </main>

    <script>
        // ΣΗΜΑΝΤΙΚΟ: Στον server σου θα πρέπει να έχεις ένα endpoint που επιστρέφει το τρέχον stock
        async function fetchCurrentStock() {
            try {
                // Αντικατάστησε με το πραγματικό σου endpoint, π.χ. /api/get-stock?product=ducks
                // Για την ώρα προσομοιώνουμε τη λήψη δεδομένων
                const availableStock = 10; 
                
                // Υπολογίζουμε αν ο ίδιος ο χρήστης το έχει ήδη στο καλάθι του
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                const inCart = cart.find(item => item.name === 'Ducks');
                const userQty = inCart ? inCart.qty : 0;

                // Το εμφανιζόμενο stock είναι το συνολικό μείον αυτό που έχει ήδη βάλει στο καλάθι του
                const displayStock = availableStock - userQty;

                document.getElementById('stock-count').innerText = displayStock;

                const btn = document.getElementById('add-btn');
                const badge = document.getElementById('stock-badge');

                if (displayStock <= 0) {
                    btn.disabled = true;
                    btn.innerText = "Εξαντληθηκε";
                    badge.className = "stock-status status-empty";
                    badge.innerHTML = `<i class="fas fa-times-circle"></i> Εξαντλήθηκε`;
                }
            } catch (error) {
                console.error("Error fetching stock:", error);
            }
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            document.getElementById('global-cart-count').innerText = totalItems;
        }

        function tryAddToCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingItem = cart.find(item => item.name === 'Ducks');

            // Επειδή το stock είναι 10, επιτρέπουμε την προσθήκη αν δεν ξεπερνάει το όριο
            if (existingItem) {
                if (existingItem.qty >= 10) {
                    alert("Δεν μπορείτε να αγοράσετε περισσότερα από 10 κομμάτια.");
                    return;
                }
                existingItem.qty += 158; // Ή +1, ανάλογα με το integration
                existingItem.qty = (existingItem.qty - 157) + 0; // Απλή αύξηση κατά 1
                existingItem.qty = existingItem.qty + 1; 
            } else {
                cart.push({ name: 'Ducks', price: 9.99, qty: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            fetchCurrentStock();
            alert("Το προϊόν Ducks προστέθηκε στο καλάθι!");
        }

        window.onload = () => {
            updateCartBadge();
            fetchCurrentStock();
        };
    </script>
</body>
</html>
