<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroleagueSelect - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', sans-serif; font-size: 28px; font-weight: bold; }
        .playful-logo span { color: #ff0000; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .main-banner { width: 100%; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .team-card { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s; }
        .team-card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; }
        .team-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; min-height: 35px; }
        .team-price { color: #ff0000; font-size: 16px; font-weight: bold; margin-bottom: 15px; }

        .add-btn { background: #ff0000; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .add-btn:hover:not(:disabled) { background: #cc0000; }
        .add-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background: rgba(0,0,0,0.9); border-left: 2px solid #ff0000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; z-index: 100; }
        .cart-count { background: #ff0000; color: white; padding: 2px 6px; border-radius: 50%; font-size: 10px; position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <a href="../checkout.html" style="color: white; position: relative;"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="global-cart-count">0</span></a>
    </aside>

    <header class="main-header">
        <nav><a href="../boxesOrder.html" style="color:white; text-decoration:none;">BOXES</a></nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav><a href="../breakOrder.html" style="color:white; text-decoration:none;">BREAKS</a></nav>
    </header>

    <main class="container">
        <img src="../images/imageEuroleaugueBreak.png" class="main-banner" alt="Euroleague">
        <div id="teams-grid" class="teams-grid"></div>
    </main>

    <script>
        const euroleagueTeams = [
            { id: 1, name: "Anadolu Efes Istanbul", price: 25.00, logo: "images/imageAna.png" },
            { id: 2, name: "AS Monaco", price: 30.00, logo: "images/imageMon.png" },
            { id: 3, name: "Crvena Zvezda Meridianbet Belgrade", price: 20.00, logo: "images/imageZve.png" },
            { id: 4, name: "Dubai Basketball", price: 20.00, logo: "images/imageDub.png" },
            { id: 5, name: "EA7 Emporio Armani Milan", price: 25.00, logo: "images/imageMil.png" },
            { id: 6, name: "FC Barcelona", price: 50.00, logo: "images/imageBar.png" },
            { id: 7, name: "FC Bayern Munich", price: 20.00, logo: "images/imageBay.png" },
            { id: 8, name: "Fenerbahce Beko Istanbul", price: 35.00, logo: "images/imageFen.png" },
            { id: 9, name: "Hapoel IBI Tel Aviv", price: 20.00, logo: "images/imageHap.png" },
            { id: 10, name: "Kosner Baskonia Vitoria-Gasteiz", price: 30.00, logo: "images/imageBasc.png" },
            { id: 11, name: "LDLC ASVEL Villeurbanne", price: 70.00, logo: "images/imageVil.png" },
            { id: 12, name: "Maccabi Rapyd Tel Aviv", price: 35.00, logo: "images/imageMac.png" },
            { id: 13, name: "Olympiacos Piraeus", price: 70.00, logo: "images/imageOly.png" },
            { id: 14, name: "Panathinaikos AKTOR Athens", price: 110.00, logo: "images/imagePan.png" },
            { id: 15, name: "Paris Basketball", price: 25.00, logo: "images/imagePar.png" },
            { id: 16, name: "Partizan Mozzart Bet Belgrade", price: 50.00, logo: "images/imagePart.png" },
            { id: 17, name: "Real Madrid", price: 115.00, logo: "images/imageMad.png" },
            { id: 18, name: "Virtus Bologna", price: 30.00, logo: "images/imageBol.png" },
            { id: 19, name: "Valencia Basket", price: 35.00, logo: "images/imageVal.png" },
            { id: 20, name: "Zalgiris Kaunas", price: 25.00, logo: "images/imageZal.png" },
            { id: 21, name: "Olympiacos Piraeus LEGEND", price: 100.00, logo: "images/imageOly.png" },
            { id: 22, name: "Panathinaikos AKTOR Athens LEGEND", price: 150.00, logo: "images/imagePan.png" },
            { id: 23, name: "CSKA Moscow", price: 50.00, logo: "images/imageCska.png" }
        ];

        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = euroleagueTeams.map(team => `
                <div class="team-card">
                    <img src="${team.logo}" alt="${team.name}">
                    <div class="team-name">${team.name}</div>
                    <div class="team-price">${team.price.toFixed(2)} €</div>
                    <button class="add-btn" id="btn-${team.id}" onclick="addToCart(${team.id})">Επιλογή</button>
                </div>
            `).join('');
            checkLocks();
        }

        async function checkLocks() {
            try {
                const response = await fetch('/api/reserve-euroleague');
                const data = await response.json();
                
                euroleagueTeams.forEach(team => {
                    const btn = document.getElementById(`btn-${team.id}`);
                    if (data.locked.includes(team.id)) {
                        btn.disabled = true;
                        btn.innerText = "Δεσμευμένο";
                    } else {
                        btn.disabled = false;
                        btn.innerText = "Επιλογή";
                    }
                });
            } catch (e) { console.error("Σφάλμα σύνδεσης με server:", e); }
        }

        async function addToCart(teamId) {
            const btn = document.getElementById(`btn-${teamId}`);
            btn.disabled = true;
            btn.innerText = "Αναμονή...";

            try {
                const res = await fetch('/api/reserve-euroleague', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ teamId, action: 'add' })
                });

                if (res.ok) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    const team = euroleagueTeams.find(t => t.id === teamId);
                    cart.push({ name: team.name, price: team.price, teamId: teamId });
                    localStorage.setItem('cart', JSON.stringify(cart));
                    location.href = "../checkout.html";
                } else {
                    alert("Η ομάδα επιλέχθηκε μόλις τώρα από άλλον χρήστη!");
                    checkLocks();
                }
            } catch(e) { 
                alert("Σφάλμα σύνδεσης");
                btn.disabled = false;
                btn.innerText = "Επιλογή";
            }
        }

        // Αυτόματη ανανέωση κάθε 5 δευτερόλεπτα για ενημέρωση των slots
        setInterval(checkLocks, 5000);
        window.onload = renderTeams;
    </script>
</body>
</html>
