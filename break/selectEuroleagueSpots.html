<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroleagueSelect - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .panel-top { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .right-side-panel a { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; cursor: pointer; }
        .right-side-panel a:hover { color: #ff0000; transform: scale(1.1); }
        .cart-container { position: relative; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }

        /* CONTAINER & CARDS */
        .product-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .shipping-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .shipping-card { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        
        .card-image-container { height: 100px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 8px; }
        .card-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-title { font-size: 16px; margin-bottom: 10px; font-weight: bold; }
        .card-price { font-size: 20px; color: #ff0000; font-weight: bold; margin-bottom: 10px; }
        
        .add-btn { width: 100%; background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .add-btn:hover:not(:disabled) { background-color: #ff0000; }
        .add-btn:disabled { border-color: #475569; color: #64748b; cursor: not-allowed; background-color: rgba(71, 85, 105, 0.1); }
        .remove-link { display: inline-block; margin-top: 10px; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="../checkout.html" title="Καλάθι Αγορών" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav><a href="../boxesOrder.html">BOXES</a> <a href="../breakOrder.html">BREAKS</a> <a href="../shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a></nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav><a href="../howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a> <a href="../terms.html">ΟΡΟΙ</a> <a href="../newUpdate.html">ΝΕΑ</a></nav>
    </header>

    <main class="product-wrapper">
        <div id="teams-grid" class="shipping-grid"></div>
    </main>

    <script>
        const euroleagueTeams = [
            { id: 1, name: "Anadolu Efes", price: 25.00, logo: "../images/imageAna.png" },
            { id: 2, name: "AS Monaco", price: 30.00, logo: "../images/imageMon.png" },
            // ... πρόσθεσε τις υπόλοιπες ομάδες εδώ
        ];

        async function updatePageState() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('global-cart-count').innerText = cart.length;

            try {
                const response = await fetch('/api/reserve-euroleagueSelect');
                const data = await response.json(); 
                
                const grid = document.getElementById('teams-grid');
                grid.innerHTML = euroleagueTeams.map(team => {
                    const inCart = cart.find(t => t.teamId === team.id);
                    const isSoldOut = data.stocks && data.stocks[team.id] === 0 && !inCart;

                    return `
                        <div class="shipping-card">
                            <div class="card-image-container"><img src="${team.logo}" alt="${team.name}"></div>
                            <h2 class="card-title">${team.name}</h2>
                            <div class="card-price">${team.price.toFixed(2)} €</div>
                            <button class="add-btn" id="btn-${team.id}" ${isSoldOut || inCart ? 'disabled' : ''} onclick="addToCart(${team.id})">
                                ${isSoldOut ? 'Δεσμευμένο' : (inCart ? 'Στο καλάθι' : 'Προσθήκη')}
                            </button>
                            ${inCart ? `<span class="remove-link" onclick="removeFromCart(${team.id})"><i class="fas fa-trash"></i> Αφαίρεση</span>` : ''}
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function addToCart(teamId) {
            try {
                const res = await fetch('/api/reserve-euroleagueSelect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ teamId, action: 'add' })
                });
                if (res.ok) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    const team = euroleagueTeams.find(t => t.id === teamId);
                    cart.push({ name: team.name, price: team.price, teamId: teamId });
                    localStorage.setItem('cart', JSON.stringify(cart));
                } else { alert("Η ομάδα μόλις δεσμεύτηκε!"); }
            } catch(e) { console.error(e); }
            updatePageState();
        }

        async function removeFromCart(teamId) {
            try {
                await fetch('/api/reserve-euroleagueSelect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ teamId, action: 'remove' })
                });
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                cart = cart.filter(t => t.teamId !== teamId);
                localStorage.setItem('cart', JSON.stringify(cart));
            } catch(e) { console.error(e); }
            updatePageState();
        }

        setInterval(updatePageState, 3000);
        window.onload = updatePageState;
    </script>
</body>
</html>
