<!DOCTYPE html>
<html lang="el">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>EuroleagueSelect - MinoanHobby</title>
				<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

					<style>
						* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
						body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

						.main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
						.main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
						.main-header nav a:hover { color: #ff0000; }
						.playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
						.playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

						.right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0,0,0,0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
						.panel-top, .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 25px; }
						.right-side-panel a { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; cursor: pointer; }
						.right-side-panel a:hover { color: #ff0000; transform: scale(1.1); }

						.cart-container { position: relative; }
						.cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }

						.product-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
						.shipping-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
						.shipping-card { background-color: #0b132b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; display: flex; flex-direction: column; transition: 0.3s; }
						.card-image-container { height: 80px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
						.card-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
						.card-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; min-height: 35px; }
						.card-price { color: #ff0000; font-size: 18px; font-weight: bold; margin-bottom: 15px; }

						.add-btn { width: 100%; background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
						.add-btn:hover:not(:disabled) { background-color: #ff0000; }
						.add-btn:disabled { border-color: #475569; color: #64748b; cursor: not-allowed; background-color: rgba(71,85,105,0.1); }

						.remove-link { display: inline-block; margin-top: 10px; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; }

						@media (max-width: 768px) {
						body { padding-right: 0; padding-bottom: 70px; }

						.right-side-panel {
						position: fixed;
						bottom: 0;
						top: auto;
						right: 0;
						width: 100%;
						height: 60px;
						flex-direction: row;
						padding: 0 20px;
						border-left: none;
						border-top: 2px solid #ff0000;
						}

						.panel-top, .panel-bottom {
						flex-direction: row;
						gap: 22px;
						}

						.main-header {
						flex-direction: column;
						gap: 15px;
						padding: 15px 10px;
						text-align: center;
						}

						.main-header nav {
						display: flex;
						flex-wrap: wrap;
						justify-content: center;
						gap: 12px;
						}

						.main-header nav a {
						margin: 0;
						font-size: 12px;
						}

						.playful-logo {
						font-size: 24px;
						order: -1;
						}
						}
					</style>
				</head>

	<body>

		<aside class="right-side-panel">
			<div class="panel-top">
				<a href="../checkout.html" title="Καλάθι Αγορών" class="cart-container">
					<i class="fas fa-shopping-cart"></i>
					<span class="cart-count" id="global-cart-count">0</span>
				</a>
			</div>

			<div class="panel-bottom">
				<a href="https://www.instagram.com/minoanhobby/" target="_blank">
					<i class="fab fa-instagram"></i>
				</a>
				<a href="https://www.youtube.com/@makisscharlie" target="_blank">
					<i class="fab fa-youtube"></i>
				</a>
			</div>
		</aside>

		<header class="main-header">
			<nav>
				<a href="../boxesOrder.html">BOXES</a>
				<a href="../breakOrder.html">BREAKS</a>
				<a href="../shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
			</nav>

			<div class="playful-logo">
				Minoan<span>Hobby</span>
			</div>

			<nav>
				<a href="../howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
				<a href="../terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
				<a href="../newUpdates.html">ΝΕΑ</a>
			</nav>
		</header>

		<main class="product-wrapper">
			<div id="teams-grid" class="shipping-grid"></div>
		</main>

		<script>
			const euroleagueTeams = [
		{ id: 1, name: "Anadolu Efes", price: 20.00, logo: "../images/imageAna.png" },
		{ id: 2, name: "AS Monaco", price: 35.00, logo: "../images/imageMon.png" },
		{ id: 3, name: "Crvena Zvezda", price: 20.00, logo: "../images/imageZve.png" },
		{ id: 4, name: "Dubai BC", price: 20.00, logo: "../images/imageDub.png" },
		{ id: 5, name: "Olimpia Milan", price: 20.00, logo: "../images/imageMil.png" },
		{ id: 6, name: "FC Barcelona", price: 55.00, logo: "../images/imageBar.png" },
		{ id: 7, name: "Bayern Munich", price: 20.00, logo: "../images/imageBay.png" },
		{ id: 8, name: "Fenerbahce", price: 50.00, logo: "../images/imageFen.png" },
		{ id: 9, name: "Hapoel Tel Aviv", price: 15.00, logo: "../images/imageHap.png" },
		{ id: 10, name: "Baskonia/Cedevita", price: 30.00, logo: "../images/imageBasc.png" },
		{ id: 11, name: "ASVEL", price: 50.00, logo: "../images/imageVil.png" },
		{ id: 12, name: "Maccabi Tel Aviv", price: 25.00, logo: "../images/imageMac.png" },
		{ id: 13, name: "Olympiacos", price: 80.00, logo: "../images/imageOly.png" },
		{ id: 14, name: "Panathinaikos", price: 155.00, logo: "../images/imagePan.png" },
		{ id: 15, name: "Paris Basketball", price: 20.00, logo: "../images/imagePar.png" },
		{ id: 16, name: "Partizan", price: 30.00, logo: "../images/imagePart.png" },
		{ id: 17, name: "Real Madrid", price: 140.00, logo: "../images/imageMad.png" },
		{ id: 18, name: "Virtus Bologna/ROMA", price: 30.00, logo: "../images/imageBol.png" },
		{ id: 19, name: "Valencia Basket", price: 30.00, logo: "../images/imageVal.png" },
		{ id: 20, name: "Zalgiris Kaunas", price: 20.00, logo: "../images/imageZal.png" },
		{ id: 21, name: "Olympiacos Legend", price: 65.00, logo: "../images/imageOly.png" },
		{ id: 22, name: "Panathinaikos Legend", price: 150.00, logo: "../images/imagePan.png" },
		{ id: 23, name: "CSKA Moscow", price: 40.00, logo: "../images/imageCska.png" }
		];

			const CART_EXPIRE_TIME = 10 * 60 * 60 * 1000; // 10 hours
			const RESERVE_API = '/api/reserve-euroleagueSelect';

			function getCartId() {
			let cartId = localStorage.getItem('cartId');

			if (!cartId) {
			cartId = crypto.randomUUID();
			localStorage.setItem('cartId', cartId);
			}

			return cartId;
			}

			function getCart() {
			try {
			return JSON.parse(localStorage.getItem('cart')) || [];
			} catch (e) {
			return [];
			}
			}

			function saveCart(cart) {
			localStorage.setItem('cart', JSON.stringify(cart));
			}

			async function reserveTeam(teamId) {
			const res = await fetch(RESERVE_API, {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({
			action: 'reserve',
			teamId: Number(teamId),
			cartId: getCartId()
			})
			});

			const data = await res.json();

			if (!res.ok) {
			throw new Error(data.error || 'reserve_failed');
			}

			return data;
			}

			async function releaseTeam(teamId) {
			const res = await fetch(RESERVE_API, {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({
			action: 'release',
			teamId: Number(teamId),
			cartId: getCartId()
			})
			});

			const data = await res.json();

			if (!res.ok) {
			throw new Error(data.error || 'release_failed');
			}

			return data;
			}

			async function cleanExpiredTeamItems() {
			const now = Date.now();
			const cart = getCart();
			const validItems = [];

			for (const item of cart) {
			const isTeamItem = item.teamId && item.addedAt;
			const isExpired = isTeamItem && (now - item.addedAt) >= CART_EXPIRE_TIME;

				if (isExpired) {
					// expired local-only item: no Redis release (reservation happens at checkout)
					console.info('Expired local team item (no Redis hold):', item.teamId);
				} else {
					validItems.push(item);
				}
			}

			saveCart(validItems);

			if (validItems.length === 0) {
			localStorage.removeItem('cartStartTime');
			}
			}

			async function updatePageState() {
			await cleanExpiredTeamItems();

			const cart = getCart();

			const badge = document.getElementById('global-cart-count');
			if (badge) {
			badge.innerText = cart.length;
			}

			try {
			const res = await fetch(RESERVE_API);
			const data = await res.json();

			const grid = document.getElementById('teams-grid');
			const sortedTeams = [...euroleagueTeams].sort((a, b) => b.price - a.price);

			grid.innerHTML = sortedTeams.map(team => {
			const inCart = cart.find(t => Number(t.teamId) === Number(team.id));
			const state = data.stocks ? data.stocks[team.id] : 'available';

			const isSold = state === 'sold';
			const isHeld = state === 'held' && !inCart;

			let buttonText = 'Επιλογή';

			if (isSold) {
			buttonText = 'Πωλήθηκε';
			} else if (isHeld) {
			buttonText = 'Δεσμευμένο';
			} else if (inCart) {
			buttonText = 'Στο καλάθι';
			}

			return `
			<div class="shipping-card">
				<div class="card-image-container">
					<img src="${team.logo}" alt="${team.name}">
                            </div>

				<h2 class="card-title">${team.name}</h2>

				<div class="card-price">${team.price.toFixed(2)} €</div>

				<button
					class="add-btn"
					id="btn-${team.id}"
					${ (isSold || isHeld || inCart) ? 'disabled' : '' }
					onclick="addToCart(${team.id})">
					${buttonText}
				</button>

				${
				inCart
				? `<span class="remove-link" onclick="removeFromCart(${team.id})">
					<i class="fas fa-trash"></i>
					Αφαίρεση
				</span>`
				: ''
				}
			</div>
			`;
			}).join('');

			} catch (e) {
			console.error(e);
			}
			}

			async function addToCart(teamId) {
			try {
			let cart = getCart();

			const alreadyInCart = cart.some(t => Number(t.teamId) === Number(teamId));

			if (alreadyInCart) {
			await updatePageState();
			return;
			}


			const team = euroleagueTeams.find(t => Number(t.id) === Number(teamId));

			if (!team) {
			alert('Δεν βρέθηκε η ομάδα.');

			try {
			await releaseTeam(teamId);
			} catch (e) {}

			await updatePageState();
			return;
			}

			cart.push({
			name: team.name,
			price: team.price,
			teamId: Number(teamId),
			qty: 1,
			addedAt: Date.now(),
			cartId: getCartId()
			});

			saveCart(cart);

			if (!localStorage.getItem('cartStartTime')) {
			localStorage.setItem('cartStartTime', Date.now());
			}

			await updatePageState();

			} catch (e) {
			console.error(e);
			alert('Σφάλμα κατά την προσθήκη στο καλάθι.');
			await updatePageState();
			}
			}

			async function removeFromCart(teamId) {
			try {
			let cart = getCart();

			cart = cart.filter(t => Number(t.teamId) !== Number(teamId));
			saveCart(cart);

			if (cart.length === 0) {
			localStorage.removeItem('cartStartTime');
			}

			// team reservations in Redis are created at checkout; nothing to release here

			await updatePageState();

			} catch (e) {
			console.error(e);
			alert('Σφάλμα στην αφαίρεση από το καλάθι.');
			await updatePageState();
			}
			}

			setInterval(updatePageState, 2000);
			window.onload = updatePageState;
		</script>

	</body>
</html>
