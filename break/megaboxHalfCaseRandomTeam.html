<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megabox Break - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .panel-top { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .right-side-panel a, .right-side-panel .lang-selector { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .right-side-panel a:hover, .right-side-panel .lang-selector:hover { color: #ff0000; transform: scale(1.1); }
        .cart-container { position: relative; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }

        /* CONTAINER & CARDS */
        .shipping-container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        .page-title { color: #ff0000; font-size: 32px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
        .page-subtitle { text-align: center; color: #cbd5e1; margin-bottom: 40px; font-size: 15px; }
        
        .shipping-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .shipping-card { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s; }
        
        .card-icon { font-size: 45px; color: #ff0000; margin-bottom: 15px; }
        .card-title { font-size: 20px; color: #ffffff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-price { font-size: 32px; color: #ff0000; font-weight: bold; margin-bottom: 5px; }
        .stock-indicator { font-size: 13px; color: #22c55e; font-weight: 600; margin-bottom: 15px; }
        .stock-indicator.out { color: #ef4444; }
        .card-desc { color: #cbd5e1; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }

        /* BUTTONS */
        .add-btn { width: 100%; background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 15px; text-transform: uppercase; transition: 0.3s; }
        .add-btn:hover:not(:disabled) { background-color: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4); }
        .add-btn:disabled { border-color: #475569; color: #64748b; cursor: not-allowed; background-color: rgba(71, 85, 105, 0.1); }
        .remove-link { display: inline-block; margin-top: 10px; color: #ef4444; font-size: 13px; text-decoration: none; font-weight: 600; cursor: pointer; }
        .remove-link:hover { text-decoration: underline; }
        /* Πρόσθεσε αυτά στο style σου */
        .card-image-container { 
            width: 100%; 
            height: 160px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            border-radius: 8px; 
        }
        .card-image-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="../checkout.html" title="Καλάθι Αγορών" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector">🇬🇷<br>ΕΛ</div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

     <header class="main-header">
        <nav class="nav-left">
            <a href="../boxesOrder.html">BOXES</a>
            <a href="../breakOrder.html">BREAKS</a>
            <a href="../shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav class="nav-right">
            <a href="../howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="../terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="../newUpdate.html">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>


    <main class="shipping-container">
        <h1 class="page-title">Megabox Random Team</h1>
        <p class="page-subtitle">Κλείστε τη θέση σας στο Half Case Random Team Break.</p>

        <div class="shipping-grid">
            <div class="shipping-card">
                <div>
                    <div class="card-image-container">
                    <img src="../images/megabox-photo.png" alt="Megabox">
                    </div>
                    <h2 class="card-title">Half Case Random Team Euroleague Mega Boxes</h2>
                    <div class="card-price">27.49 €</div>
                    <div id="megabox-stock-text" class="stock-indicator">Φόρτωση αποθέματος...</div>
                    <p class="card-desc">Συμμετοχή στο μεγάλο Megabox Break. Live απόθεμα 18 spot.</p>
                </div>
                <div>
                    <button class="add-btn" id="btn-megabox" onclick="addMegaboxToCart()">Προσθηκη στο καλαθι</button>
                    <div id="remove-megabox-box"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function updatePageState() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) badge.innerText = totalItems;

            const megaboxInCart = cart.find(item => item.name === 'Megabox Half Case');
            const userQty = megaboxInCart ? megaboxInCart.qty : 0;

            const btnMegabox = document.getElementById('btn-megabox');
            const stockText = document.getElementById('megabox-stock-text');
            const removeBox = document.getElementById('remove-megabox-box');

            try {
                // Χτυπάμε το GET του νέου endpoint
                const response = await fetch('/api/reserve-megabox'); 
                const data = await response.json();
                const realLiveStock = data.stock !== undefined ? data.stock : 18;

                if (realLiveStock <= 0) {
                    btnMegabox.disabled = true;
                    btnMegabox.innerText = "Εξαντλήθηκε";
                    stockText.className = "stock-indicator out";
                    stockText.innerText = "❌ Μη διαθέσιμο απόθεμα";
                    removeBox.innerHTML = userQty > 0 ? `<span class="remove-link" onclick="removeMegaboxFromCart()"><i class="fas fa-trash"></i> Αφαίρεση από καλάθι</span>` : "";
                } else if (userQty > 0) {
                    btnMegabox.disabled = false;
                    btnMegabox.innerText = `Προσθήκη ξανά (+1) | Έχετε: ${userQty}`;
                    stockText.className = "stock-indicator";
                    stockText.innerText = `✔️ Live Απόθεμα στο Redis: ${realLiveStock} διαθέσιμα`;
                    removeBox.innerHTML = `<span class="remove-link" onclick="removeMegaboxFromCart()"><i class="fas fa-trash"></i> Αφαίρεση όλων</span>`;
                } else {
                    btnMegabox.disabled = false;
                    btnMegabox.innerText = "Προσθηκη στο καλαθι";
                    stockText.className = "stock-indicator";
                    stockText.innerText = `🔥 Live Stock: ${realLiveStock} διαθέσιμα`;
                    removeBox.innerHTML = "";
                }
            } catch (error) {
                console.error("Error loading stock:", error);
                stockText.innerText = "Σφάλμα φόρτωσης στοκ";
            }
        }

        async function addMegaboxToCart() {
            const btnMegabox = document.getElementById('btn-megabox');
            btnMegabox.disabled = true;
            btnMegabox.innerText = "Παρακαλώ περιμένετε...";

            try {
                const response = await fetch('/api/reserve-megabox', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add' })
                });

                const data = await response.json();

                if (response.ok) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    const existingItem = cart.find(item => item.name === 'Megabox Half Case');

                    if (existingItem) {
                        existingItem.qty += 1;
                    } else {
                        cart.push({ name: 'Megabox Half Case', price: 27.49, qty: 1 });
                    }

                    localStorage.setItem('cart', JSON.stringify(cart));
                    if (
                        !localStorage.getItem(
                            'cartStartTime'
                        )
                    ) {
                        localStorage.setItem(
                            'cartStartTime',
                            Date.now()
                        );
                    }
                    
                    if (!sessionStorage.getItem('checkout_timer_start')) {
                        sessionStorage.setItem('checkout_timer_start', Date.now());
                    }
                } else {
                    alert(data.error || "Δεν υπάρχει διαθέσιμο στοκ.");
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                await updatePageState();
            }
        }

        async function removeMegaboxFromCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const megaboxItem = cart.find(item => item.name === 'Megabox Half Case');
            
            if (!megaboxItem) return;

            const btnMegabox = document.getElementById('btn-megabox');
            btnMegabox.disabled = true;

            try {
                for (let i = 0; i < megaboxItem.qty; i++) {
                    await fetch('/api/reserve-megabox', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'remove' })
                    });
                }
                cart = cart.filter(item => item.name !== 'Megabox Half Case');
                localStorage.setItem('cart', JSON.stringify(cart));
            } catch (error) {
                console.error("Error:", error);
            } finally {
                await updatePageState();
            }
        }

        window.onload = updatePageState;
    </script>
</body>
</html>
