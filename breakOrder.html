<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Breaks - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .panel-top, .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .right-side-panel a, .lang-selector { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: 0.3s; cursor: pointer; position: relative; }
        .right-side-panel a:hover, .lang-selector:hover { color: #ff0000; transform: scale(1.1); }
        .cart-container { position: relative; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }

        /* CONTAINER & GRIDS */
        .breaks-container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .page-title { color: #ff0000; font-size: 36px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 10px; letter-spacing: 1px; }
        .page-subtitle { text-align: center; color: #cbd5e1; margin-bottom: 40px; font-size: 15px; }
        .products-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-bottom: 5px; }

        /* CARDS */
        .team-box-product { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 30px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .team-box-product:hover { transform: translateY(-5px); }
        .card-image-container { width: 100%; height: 160px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 8px; }
        .card-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-title { font-size: 22px; color: #ffffff; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .card-price { font-size: 32px; color: #ff0000; font-weight: bold; margin-bottom: 5px; }
        .stock-indicator { font-size: 13px; color: #22c55e; font-weight: 600; margin-bottom: 15px; }
        .card-desc { color: #cbd5e1; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        .add-btn { width: 100%; background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .add-btn:hover:not(:disabled) { background-color: #ff0000; }
        .remove-link { display: inline-block; margin-top: 10px; color: #ef4444; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="checkout.html" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector">🇬🇷<br>ΕΛ</div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav>
            <a href="boxesOrder.html">BOXES</a>
            <a href="breakOrder.html" style="color: #ff0000;">BREAKS</a>
            <a href="shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav>
            <a href="howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="newUpdate.html">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>

    <main class="breaks-container">
        <h1 class="page-title">Live Breaks</h1>
        <p class="page-subtitle">Επιλέξτε το πακέτο που θέλετε να ανοιχτεί ζωντανά στο επόμενο stream.</p>

        <div class="products-grid">
            <div class="team-box-product">
                <div>
                    <div class="card-image-container"><img src="ducks-image.jpg" alt="Ducks Break"></div>
                    <h2 class="card-title">Ducks</h2>
                    <div class="card-price">9.99 €</div>
                    <div id="ducks-stock-text" class="stock-indicator">Φόρτωση...</div>
                    <p class="card-desc">Αποκλειστικό Ducks Break.</p>
                </div>
                <button class="add-btn" id="btn-ducks" onclick="addDucksToCart()">Προσθηκη στο καλαθι</button>
                <div id="remove-ducks-box"></div>
            </div>

            <div class="team-box-product">
                <div>
                    <div class="card-image-container"><img src="images/megabox-photo.png" alt="Megabox"></div>
                    <h2 class="card-title">Megabox Half Case</h2>
                    <div class="card-price">27.49 €</div>
                    <div id="megabox-stock-text" class="stock-indicator">Φόρτωση...</div>
                    <p class="card-desc">Μεγάλο Megabox Break.</p>
                </div>
                <button class="add-btn" id="btn-megabox" onclick="addMegaboxToCart()">Προσθηκη στο καλαθι</button>
                <div id="remove-megabox-box"></div>
            </div>
        </div>
    </main>

    <script>
        // Λογική καλαθιού
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const total = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) badge.innerText = total;
        }

        async function updatePageState() {
            updateCartBadge();
            // Εδώ παραμένει η logική για το stock και το fetch που είχες
        }

        window.onload = updatePageState;
        window.addEventListener('storage', updatePageState);
    </script>
</body>
</html>
