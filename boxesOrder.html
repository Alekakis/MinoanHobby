<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πακέτα - MinoanHobby</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: #0d1b2a; color: #ffffff; overflow-x: hidden; padding-right: 60px; }

        /* HEADER & NAVIGATION */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0b132b;
            border-bottom: 2px solid #ff0000;
            position: relative;
            z-index: 10;
        }

        .main-header nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .main-header nav a:hover { color: #ff0000; }

        .playful-logo {
            font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* SIDEBAR */
        .right-side-panel {
            position: fixed; top: 0; right: 0; width: 60px; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 25px 0; z-index: 100;
        }

        .panel-top, .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 25px; }

        .right-side-panel a, .lang-selector { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: 0.3s; cursor: pointer; }

        .right-side-panel a:hover, .lang-selector:hover { color: #ff0000; transform: scale(1.1); }

        .cart-container { position: relative; }

        .cart-count {
            background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%;
            font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px;
        }

        /* PRODUCTS SECTION */
        .products-section { padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
        .section-title { color: #ff0000; font-size: 32px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 50px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }

        .product-card {
            background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; display: flex; flex-direction: column;
            text-decoration: none; color: #ffffff; transition: 0.3s;
        }

        .product-card:hover { transform: translateY(-10px); border-color: #ff0000; }

        .product-image-wrapper { width: 100%; height: 280px; display: flex; justify-content: center; align-items: center; position: relative; }
        .product-image { max-width: 90%; max-height: 90%; object-fit: contain; }
        .product-badge { position: absolute; top: 15px; left: 15px; background: #ff0000; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; }
        
        .product-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 16px; margin-bottom: 10px; color: #ffffff; }
        .product-price { font-size: 20px; font-weight: 900; color: #ff0000; margin-top: auto; margin-bottom: 15px; }
        .product-btn { border: 2px solid #ff0000; padding: 10px; text-align: center; text-transform: uppercase; font-size: 13px; font-weight: 700; border-radius: 6px; transition: 0.3s; }
        .product-card:hover .product-btn { background-color: #ff0000; color: white; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="checkout.html" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector">🇬🇷<br>ΕΛ</div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav>
            <a href="boxesOrder.html">BOXES</a>
            <a href="breakOrder.html">BREAKS</a>
            <a href="shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav>
            <a href="howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="newUpdate.html">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>

    <main class="products-section">
        <div class="products-grid">
           
            <a href="boxes/euroleagueMegaBoxBasketball.html" class="product-card">
                <div class="product-image-wrapper">
                    <span class="product-badge">Live Box</span>
                    <img src="images/megabox-photo.png" alt="Mega Box" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-title">2025-26 Panini EuroLeague Contenders Mega Box</h2>
                    <div class="product-price">54.90 €</div>
                    <div class="product-btn">Αγορα Κουτιου</div>
                </div>
            </a>

           
            <a href="boxes/euroleagueSelectBox.html" class="product-card">
                <div class="product-image-wrapper">
                    <span class="product-badge">Live Box</span>
                    <img src="images/imageEuroleaugueBreak.png" alt="Select Box" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-title">2025-26 Panini EuroLeague Select Box</h2>
                    <div class="product-price">189.90 €</div>
                    <div class="product-btn">Αγορα Κουτιου</div>
                </div>
            </a>
        </div>
    </main>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) badge.innerText = totalItems;
        }

        window.onload = updateCartBadge;
        window.addEventListener('storage', (event) => {
            if (event.key === 'cart') updateCartBadge();
        });
    </script>
</body>
</html>
