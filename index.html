<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinoanHobby</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Μηδενισμός περιθωρίων και βασικές ρυθμίσεις */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1b2a;
            color: #ffffff;
            overflow-x: hidden;
            padding-right: 60px;
        }

        /* HEADER & NAVIGATION */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0b132b;
            border-bottom: 2px solid #ff0000;
            position: relative;
            z-index: 10;
        }

        .main-header nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .main-header nav a:hover {
            color: #ff0000;
        }

        .playful-logo {
            font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .playful-logo span {
            color: #ff0000;
            font-style: italic;
            display: inline-block;
            transform: rotate(-3deg);
            margin-left: 5px;
        }

        /* RIGHT SIDEBAR */
        .right-side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            border-left: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            z-index: 100;
        }

        .panel-top, .panel-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .right-side-panel a, .lang-selector {
            color: #e0e0e0;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .right-side-panel a:hover, .lang-selector:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        .cart-container { position: relative; }

        .cart-count {
            background-color: #ff0000;
            color: white;
            padding: 2px 5px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            position: absolute;
            top: -8px;
            right: -10px;
        }

        .lang-selector { font-size: 12px !important; font-weight: bold; text-align: center; }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            height: calc(100vh - 74px);
            background: linear-gradient(rgba(13, 27, 42, 0.7), #0d1b2a), url('https://via.placeholder.com/1920x1080/112233/ffffff?text=Basketball+MinoanHobby') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 40px;
        }

        .hero-logo-image { max-width: 280px; height: auto; filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.6)); }

        .subtitle { font-size: 20px; letter-spacing: 5px; margin: 5px 0 35px; color: #e0e0e0; font-weight: bold; }

        .features-container { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }

        .feature-item { display: flex; align-items: center; text-align: left; max-width: 300px; }

        .feature-icon {
            border: 2px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #ff0000;
            margin-right: 15px;
            background-color: rgba(0,0,0,0.3);
        }

        .feature-text strong { display: block; font-size: 13px; }
        .feature-text span { font-size: 11px; color: #e0e0e0; }

        .cards-preview { display: flex; gap: 20px; margin-top: 40px; }

        .card-placeholder {
            width: 120px;
            height: 170px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card-placeholder:hover { border-color: #ff0000; color: #ff0000; }

        /* CONTACT SECTION */
        .contact-section {
            text-align: center;
            padding: 40px;
            background: #0b132b;
        }
        .contact-section h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .contact-section p {
            font-size: 40px;
            font-weight: bold;
            color: #ff0000;
        }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="checkout.html" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector">🇬🇷<br>ΕΛ</div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav>
            <a href="boxesOrder.html">BOXES</a>
            <a href="breakOrder.html">BREAKS</a>
            <a href="shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav>
            <a href="howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="newUpdate.html">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <div class="hero-logo-container">
                <img src="logo.png" alt="Minoan Hobby Logo" class="hero-logo-image">
            
        </div>
    </section>

    <section class="contact-section">
        <h2>ΕΠΙΚΟΙΝΩΝΙΑ</h2>
        <p>MINOANHOBBY@GMAIL.COM</p>
    </section>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) badge.innerText = totalItems;
        }

        // Αρχική φόρτωση
        window.onload = updateCartBadge;

        // Ζωντανή ενημέρωση αν αλλάξει το καλάθι σε άλλη σελίδα
        window.addEventListener('storage', (event) => {
            if (event.key === 'cart') updateCartBadge();
        });
    </script>
</body>
</html>
