<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinoanHobby</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Μηδενισμός περιθωρίων και βασικές ρυθμίσεις */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1b2a; /* Σκούρο Μπλε φόντο */
            color: #ffffff;
            overflow-x: hidden;
            padding-right: 60px; /* Χώρος στα δεξιά για να μην πέφτει το περιεχόμενο πάνω στο πλαϊνό μενού */
        }

        /* MAIN HEADER & NAVIGATION (Στην κορυφή) */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0b132b; /* Ακόμα πιο σκούρο μπλε */
            border-bottom: 2px solid #ff0000; /* Έντονο κόκκινο border */
            position: relative;
            z-index: 10;
        }

        .main-header nav a {
            color: #e0e0e0; /* Γκρι */
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .main-header nav a:hover {
            color: #ff0000; /* Έντονο κόκκινο */
        }

        /* ΠΑΙΧΝΙΔΙΑΡΙΚΟ STYLE ΓΙΑ ΤΑ ΓΡΑΜΜΑΤΑ ΣΤΟ ΠΑΝΩ ΜΕΝΟΥ */
        .playful-logo {
            font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-transform: none;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .playful-logo span {
            color: #ff0000;
            font-style: italic;
            display: inline-block;
            transform: rotate(-3deg);
            margin-left: 5px;
        }

        /* ΜΕΓΑΛΗ ΕΙΚΟΝΑ LOGO ΣΤΟ ΚΕΝΤΡΟ */
        .hero-logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-logo-image {
            max-width: 280px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.6));
        }

        /* ΔΕΞΙ ΚΑΘΕΤΟ PANEL */
        .right-side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            border-left: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            z-index: 100;
        }

        .panel-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .panel-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .right-side-panel a, .right-side-panel .lang-selector {
            color: #e0e0e0;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .right-side-panel a:hover, .right-side-panel .lang-selector:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        .cart-container {
            position: relative;
        }

        .cart-count {
            background-color: #ff0000;
            color: white;
            padding: 2px 5px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            position: absolute;
            top: -8px;
            right: -10px;
        }

        .lang-selector {
            font-size: 12px !important;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            height: calc(100vh - 74px);
            background: linear-gradient(rgba(13, 27, 42, 0.7), #0d1b2a), url('https://via.placeholder.com/1920x1080/112233/ffffff?text=Basketball+MinoanHobby') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 40px;
        }

        .subtitle {
            font-size: 20px;
            letter-spacing: 5px;
            margin-top: 5px;
            margin-bottom: 35px;
            color: #e0e0e0;
            font-weight: bold;
        }

        /* FEATURES */
        .features-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            text-align: left;
            max-width: 300px;
        }

        .feature-icon {
            border: 2px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #ff0000;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: rgba(0,0,0,0.3);
        }

        .feature-text strong {
            display: block;
            font-size: 13px;
            color: #ffffff;
        }

        .feature-text span {
            font-size: 11px;
            color: #e0e0e0;
        }

        /* CARDS PREVIEW */
        .cards-preview {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .card-placeholder {
            width: 120px;
            height: 170px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #e0e0e0;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-placeholder:hover {
            transform: translateY(-10px);
            border-color: #ff0000;
            color: #ff0000;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        /* ΒΕΛΗ ΠΛΟΗΓΗΣΗΣ */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: 1px solid #ff0000;
            color: #e0e0e0;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
            transition: 0.3s;
        }

        .arrow-btn:hover {
            background: #ff0000;
            color: white;
        }

        .prev-btn { left: 20px; }
        .next-btn { right: 80px; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="#" class="cart-container" title="Καλάθι Αγορών">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </a>
            <div class="lang-selector" title="Αλλαγή Γλώσσας">
                🇬🇷<br>ΕΛ
            </div>
        </div>

        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav class="nav-left">
            <a href="#">ΠΑΚΕΤΑ</a>
            <a href="#">ΑΝΟΙΓΜΑΤΑ</a>
            <a href="#">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        
        <div class="playful-logo">
            Minoan<span>Hobby</span>
        </div>

        <nav class="nav-right">
            <a href="#">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="#">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>

    <section class="hero-section">
        <button class="arrow-btn prev-btn">&#10094;</button>
        <button class="arrow-btn next-btn">&#10095;</button>

        <div class="hero-content">
            <div class="hero-logo-container">
                <img src="logo.png" alt="Minoan Hobby Logo" class="hero-logo-image">
            </div>
            
            <p class="subtitle">EUROLEAGUE BASKETBALL</p>

            <div class="features-container">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-pen-nib"></i></div>
                    <div class="feature-text">
                        <strong>3 AYTOΓΡΑΦΑ Ή</strong>
                        <span>ΚΑΡΤΕΣ MEMORABILIA ΑΝΑ ΚΟΥΤΙ</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-gem"></i></div>
                    <div class="feature-text">
                        <strong>ΣΠΑΝΙΑ INSERTS</strong>
                        <span>STAINED GLASS - VISIONARY<br>EQUALIZERS - UNSTOPPABLE</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-layer-group"></i></div>
                    <div class="feature-text">
                        <strong>ΒΑΣΙΚΟ ΣΕΤ</strong>
                        <span>3 ΕΠΙΠΕΔΑ - 250 ΚΑΡΤΕΣ</span>
                    </div>
                </div>
            </div>

            <div class="cards-preview">
                <div class="card-placeholder">Κάρτα 1</div>
                <div class="card-placeholder">Κάρτα 2</div>
                <div class="card-placeholder">Κάρτα 3</div>
                <div class="card-placeholder">Κάρτα 4</div>
            </div>
        </div>
    </section>

</body>
</html>
