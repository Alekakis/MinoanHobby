<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Addicts Clone</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Μηδενισμός περιθωρίων και βασικές ρυθμίσεις */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b1a10; /* Σκούρο πράσινο/μαύρο φόντο */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            background-color: rgba(0, 0, 0, 0.5);
            font-size: 14px;
        }

        .top-bar a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .top-bar a:hover {
            color: #cca43b; /* Χρυσό hover */
        }

        .utility-icons * {
            margin-left: 15px;
            cursor: pointer;
        }

        .cart-count {
            background-color: #cca43b;
            color: black;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
        }

        /* MAIN HEADER & NAVIGATION */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #07140c;
            border-bottom: 1px solid rgba(204, 164, 59, 0.2);
        }

        .main-header nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .main-header nav a:hover {
            color: #cca43b;
        }

        /* LOGO */
        .logo h1 {
            font-size: 24px;
            font-style: italic;
            color: #fff;
            letter-spacing: 2px;
        }

        .logo h1 span {
            color: #cca43b;
            display: block;
            font-size: 14px;
            text-align: center;
            margin-top: -5px;
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            height: 85vh;
            /* Placeholder εικόνα φόντου */
            background: linear-gradient(rgba(11, 26, 16, 0.65), #0b1a10), url('https://via.placeholder.com/1920x1080/1a3322/ffffff?text=Basketball+Background') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        /* Μεγάλος Τίτλος SELECT */
        .brand-title {
            font-size: 90px;
            font-weight: 900;
            color: #cca43b;
            letter-spacing: 5px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        }

        .subtitle {
            font-size: 18px;
            letter-spacing: 4px;
            margin-top: -10px;
            margin-bottom: 40px;
            color: #ddd;
        }

        /* FEATURES (Κυκλάκια με πληροφορίες) */
        .features-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            text-align: left;
            max-width: 300px;
        }

        .feature-icon {
            border: 2px solid #cca43b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #cca43b;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .feature-text strong {
            display: block;
            font-size: 13px;
            color: #fff;
        }

        .feature-text span {
            font-size: 11px;
            color: #aaa;
        }

        /* CARDS PREVIEW (Κάτω μέρος του banner) */
        .cards-preview {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }

        .card-placeholder {
            width: 120px;
            height: 170px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(204, 164, 59, 0.4);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #cca43b;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card-placeholder:hover {
            transform: translateY(-10px);
            border-color: #cca43b;
        }

        /* ΒΕΛΗ ΠΛΟΗΓΗΣΗΣ */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(204, 164, 59, 0.5);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
            transition: 0.3s;
        }

        .arrow-btn:hover {
            background: #cca43b;
            color: black;
        }

        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-twitch"></i></a>
        </div>
        <div class="utility-icons">
            <a href="#"><i class="fas fa-search"></i></a>
            <a href="#"><i class="fas fa-user"></i></a>
            <a href="#"><i class="fas fa-shopping-cart"></i> <span class="cart-count">0</span></a>
            <span class="lang-selector">🇬🇷 ΕΛ <i class="fas fa-chevron-down"></i></span>
        </div>
    </div>

    <header class="main-header">
        <nav class="nav-left">
            <a href="#">BOXES</a>
            <a href="#">BREAKS</a>
            <a href="#">SUPPLIES</a>
            <a href="#">SHIPPING</a>
        </nav>
        
        <div class="logo">
            <h1>CARD<span>Addicts</span></h1>
        </div>

        <nav class="nav-right">
            <a href="#">ΤΙ ΕΙΝΑΙ ΤΟ BREAK</a>
            <a href="#">ΣΧΕΤΙΚΑ</a>
            <a href="#">ΕΠΙΚΟΙΝΩΝΙΑ</a>
        </nav>
    </header>

    <section class="hero-section">
        <button class="arrow-btn prev-btn">&#10094;</button>
        <button class="arrow-btn next-btn">&#10095;</button>

        <div class="hero-content">
            <h2 class="brand-title">SELECT</h2>
            <p class="subtitle">EUROLEAGUE BASKETBALL</p>

            <div class="features-container">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-pen-nib"></i></div>
                    <div class="feature-text">
                        <strong>3 AUTOGRAPHS OR</strong>
                        <span>MEMORABILIA CARDS PER BOX</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-gem"></i></div>
                    <div class="feature-text">
                        <strong>RARE INSERTS</strong>
                        <span>STAINED GLASS - VISIONARY<br>EQUALIZERS - UNSTOPPABLE</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-layer-group"></i></div>
                    <div class="feature-text">
                        <strong>BASE SET</strong>
                        <span>3 TIERS - 250 CARDS</span>
                    </div>
                </div>
            </div>

            <div class="cards-preview">
                <div class="card-placeholder">Κάρτα 1</div>
                <div class="card-placeholder">Κάρτα 2</div>
                <div class="card-placeholder">Κάρτα 3</div>
                <div class="card-placeholder">Κάρτα 4</div>
            </div>
        </div>
    </section>

</body>
</html>
