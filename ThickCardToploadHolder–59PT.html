<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thick Card Topload Holder – 59PT - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: #0d1b2a;
            color: #ffffff;
            padding-right: 60px;
            overflow-x: hidden;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0b132b;
            border-bottom: 2px solid #ff0000;
            position: relative;
            z-index: 10;
        }

        .main-header nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .main-header nav a:hover { color: #ff0000; }

        .playful-logo {
            font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .playful-logo span {
            color: #ff0000;
            font-style: italic;
            display: inline-block;
            transform: rotate(-3deg);
            margin-left: 5px;
        }

        .right-side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 100vh;
            background-color: rgba(0,0,0,0.85);
            border-left: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            z-index: 100;
        }

        .panel-top,
        .panel-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .right-side-panel a {
            color: #e0e0e0;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .right-side-panel a:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        .cart-container { position: relative; }

        .cart-count {
            background-color: #ff0000;
            color: white;
            padding: 2px 5px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            position: absolute;
            top: -8px;
            right: -10px;
        }

        .product-wrapper {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .shipping-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .shipping-card {
            background-color: #0b132b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-image-container {
            width: 100%;
            height: 180px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
        }

        .card-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-title {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-price {
            font-size: 32px;
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stock-indicator {
            font-size: 13px;
            color: #22c55e;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .stock-indicator.out { color: #ef4444; }

        .card-desc {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .add-btn {
            width: 100%;
            background-color: transparent;
            border: 2px solid #ff0000;
            color: #ffffff;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 15px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .add-btn:hover:not(:disabled) {
            background-color: #ff0000;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
        }

        .add-btn:disabled {
            border-color: #475569;
            color: #64748b;
            cursor: not-allowed;
            background-color: rgba(71,85,105,0.1);
        }

        .remove-link {
            display: inline-block;
            margin-top: 10px;
            color: #ef4444;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .remove-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body {
                padding-right: 0;
                padding-bottom: 70px;
            }

            .right-side-panel {
                position: fixed;
                bottom: 0;
                top: auto;
                right: 0;
                width: 100%;
                height: 60px;
                flex-direction: row;
                padding: 0 20px;
                border-left: none;
                border-top: 2px solid #ff0000;
            }

            .panel-top,
            .panel-bottom {
                flex-direction: row;
                gap: 22px;
            }

            .main-header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 10px;
                text-align: center;
            }

            .main-header nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }

            .main-header nav a {
                margin: 0;
                font-size: 12px;
            }

            .playful-logo {
                font-size: 24px;
                order: -1;
            }

            .product-wrapper {
                margin: 30px auto;
                padding: 0 14px;
            }

            .shipping-card {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="checkout.html" title="Καλάθι Αγορών" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
        </div>

        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav>
            <a href="boxesOrder.html">BOXES</a>
            <a href="breakOrder.html">BREAKS</a>
            <a href="shipOrder.html">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>

        <div class="playful-logo">Minoan<span>Hobby</span></div>

        <nav>
            <a href="howWorks.html">ΠΩΣ ΛΕΙΤΟΥΡΓΕΙ</a>
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
            <a href="newUpdates.html">ΜΑΘΕΤΕ ΝΕΑ</a>
        </nav>
    </header>

    <main class="product-wrapper">
        <div class="shipping-grid">
            <div class="shipping-card">
                <div>
                    <div class="card-image-container">
                        <img src="images/ThickCard59.jpg" alt="Thick Card Topload Holder – 59PT">
                    </div>

                    <h2 class="card-title">Thick Card Topload Holder – 59PT</h2>
                    <div class="card-price" id="thickcard-price"></div>
                    <div id="thickcard-stock-text" class="stock-indicator">Φόρτωση αποθέματος...</div>
                    <p class="card-desc">
                        Τιμή pack 5,99 €<br>
                        Thick Card Topload Holder<br>
                        59PT Protection<br>
                        Για κάρτες με μεγαλύτερη προστασία
                    </p>
                </div>

                <div>
                    <button class="add-btn" id="btn-thickcard" onclick="addThickCardToCart()">Προσθηκη στο καλαθι</button>
                    <div id="remove-thickcard-box"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const THICKCARD_PRICE = 5.99;
        const CART_EXPIRE_TIME = 10 * 60 * 1000;

        async function cleanExpiredThickCardItems() {
            const now = Date.now();
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const validItems = [];

            for (const item of cart) {
                if (
                    item.name === 'Thick Card Topload Holder – 59PT' &&
                    item.addedAt &&
                    (now - item.addedAt) >= CART_EXPIRE_TIME
                ) {
                    // expired local-only item: drop it from local cart
                } else {
                    validItems.push(item);
                }
            }

            localStorage.setItem('cart', JSON.stringify(validItems));
        }

        async function updatePageState() {
            document.getElementById('thickcard-price').innerText = `${THICKCARD_PRICE.toFixed(2)} €`;
            await cleanExpiredThickCardItems();

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            document.getElementById('global-cart-count').innerText = totalItems;

            const thickcardInCart = cart.find(item => item.name === 'Thick Card Topload Holder – 59PT');
            const userQty = thickcardInCart ? thickcardInCart.qty : 0;
            const btnThickCard = document.getElementById('btn-thickcard');
            const stockText = document.getElementById('thickcard-stock-text');
            const removeBox = document.getElementById('remove-thickcard-box');

            try {
                const response = await fetch('/api/reserve-thickcard');
                const data = await response.json();
                const realLiveStock = data.stock ?? 0;
                const available = realLiveStock - userQty;

                if (realLiveStock <= 0) {
                    btnThickCard.disabled = true;
                    btnThickCard.innerText = 'Εξαντλήθηκε';
                    stockText.className = 'stock-indicator out';
                    stockText.innerText = '❌ Μη διαθέσιμο απόθεμα';
                    removeBox.innerHTML = userQty > 0
                        ? `<span class="remove-link" onclick="removeThickCardFromCart()"><i class="fas fa-trash"></i> Αφαίρεση</span>`
                        : '';
                } else if (userQty > 0) {
                    btnThickCard.disabled = (available <= 0);
                    btnThickCard.innerText = `Προσθήκη (+1) | Έχετε: ${userQty}`;
                    stockText.className = 'stock-indicator';
                    stockText.innerText = `✔️ Διαθέσιμα: ${realLiveStock}`;
                    removeBox.innerHTML = `<span class="remove-link" onclick="removeThickCardFromCart()"><i class="fas fa-trash"></i> Αφαίρεση όλων</span>`;
                } else {
                    btnThickCard.disabled = (available <= 0);
                    btnThickCard.innerText = 'Προσθηκη στο καλαθι';
                    stockText.className = 'stock-indicator';
                    stockText.innerText = `🔥 Live Stock: ${realLiveStock} διαθέσιμα`;
                    removeBox.innerHTML = '';
                }
            } catch (e) {
                stockText.innerText = 'Σφάλμα φόρτωσης στοκ';
            }
        }

        async function addThickCardToCart() {
            const btn = document.getElementById('btn-thickcard');
            btn.disabled = true;
            btn.innerText = 'Παρακαλώ περιμένετε...';

            try {
                if (!localStorage.getItem('cartId')) {
                    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                        localStorage.setItem('cartId', crypto.randomUUID());
                    } else {
                        localStorage.setItem('cartId', 'cid-' + Date.now());
                    }
                }

                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                let item = cart.find(i => i.name === 'Thick Card Topload Holder – 59PT');
                const previousQty = item ? item.qty : 0;

                if (item) {
                    item.qty++;
                    item.addedAt = Date.now();
                } else {
                    item = { name: 'Thick Card Topload Holder – 59PT', price: THICKCARD_PRICE, qty: 1, addedAt: Date.now() };
                    cart.push(item);
                }

                localStorage.setItem('cart', JSON.stringify(cart));
                if (!localStorage.getItem('cartStartTime')) localStorage.setItem('cartStartTime', Date.now());
                if (!sessionStorage.getItem('checkout_timer_start')) sessionStorage.setItem('checkout_timer_start', Date.now());

                try {
                    const resp = await fetch('/api/reserve-thickcard');
                    const data = await resp.json();
                    const realLiveStock = data.stock ?? 0;
                    if ((previousQty + 1) > realLiveStock) {
                        let cartNow = JSON.parse(localStorage.getItem('cart')) || [];
                        cartNow = cartNow.map(i => i.name === 'Thick Card Topload Holder – 59PT' ? ({ ...i, qty: Math.max(0, (i.qty || 1) - 1) }) : i).filter(i => (i.qty || 0) > 0);
                        localStorage.setItem('cart', JSON.stringify(cartNow));
                        updatePageState();
                        alert('Δεν μπορείτε να προσθέσετε περισσότερα από το διαθέσιμο απόθεμα');
                    }
                } catch (e) {
                    console.error('Stock validation failed:', e);
                    let cartNow = JSON.parse(localStorage.getItem('cart')) || [];
                    cartNow = cartNow.map(i => i.name === 'Thick Card Topload Holder – 59PT' ? ({ ...i, qty: Math.max(0, (i.qty || 1) - 1) }) : i).filter(i => (i.qty || 0) > 0);
                    localStorage.setItem('cart', JSON.stringify(cartNow));
                    updatePageState();
                    alert('Σφάλμα επικοινωνίας με τον server. Η προσθήκη στο καλάθι ακυρώθηκε.');
                }
            } catch (e) {
                console.error(e);
            }

            await updatePageState();
        }

        async function removeThickCardFromCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(i => i.name === 'Thick Card Topload Holder – 59PT');

            if (!item) return;

            try {
                localStorage.setItem('cart', JSON.stringify(cart.filter(i => i.name !== 'Thick Card Topload Holder – 59PT')));
            } catch (e) {
                console.error(e);
            }

            updatePageState();
        }

        window.onload = updatePageState;
    </script>
</body>
</html>
