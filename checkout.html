<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', sans-serif; font-size: 28px; font-weight: bold; }
        .playful-logo span { color: #ff0000; font-style: italic; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }
        
        /* CHECKOUT */
        .checkout-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .box-panel { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); }
        .remove-btn { color: #ff0000; cursor: pointer; border: none; background: none; font-size: 16px; margin-left: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; background: #0d1b2a; border: 1px solid #475569; color: white; border-radius: 6px; }
        .submit-btn { width: 100%; background: transparent; border: 2px solid #ff0000; color: white; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .submit-btn:hover:not(:disabled) { background: #ff0000; }
        .timer-banner { background: #ff0000; color: white; text-align: center; padding: 10px; margin-bottom: 20px; display: none; border-radius: 6px; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <a href="checkout.html" class="cart-container" style="position:relative; color:white;">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="global-cart-count">0</span>
        </a>
    </aside>

    <main class="checkout-container">
        <h1 style="color: #ff0000; text-align: center; margin-bottom: 30px;">ΟΛΟΚΛΗΡΩΣΗ ΑΓΟΡΑΣ</h1>
        <div id="stock-timer" class="timer-banner"></div>

        <div class="box-panel">
            <h2>Τα Προϊόντα σας</h2>
            <div id="cart-summary-list"></div>
            <div style="margin-top:20px; font-weight:bold;">Σύνολο: <span id="cart-total-price">0.00 €</span></div>
        </div>

        <div class="box-panel">
            <h2>Στοιχεία Πελάτη</h2>
            <form id="checkout-form" onsubmit="handleCheckout(event)">
                <div class="form-group"><input type="text" id="firstname" placeholder="Όνομα" required></div>
                <div class="form-group"><input type="text" id="lastname" placeholder="Επώνυμο" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
                <div class="form-group"><input type="tel" id="phone" placeholder="Τηλέφωνο" required></div>
                <button type="submit" class="submit-btn" id="submit-order-btn">ΠΛΗΡΩΜΗ ΜΕ ΚΑΡΤΑ</button>
            </form>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function loadCartSummary() {
            const listContainer = document.getElementById('cart-summary-list');
            const badge = document.getElementById('global-cart-count');
            let total = 0;

            if (cart.length === 0) {
                listContainer.innerHTML = "<p>Το καλάθι είναι άδειο.</p>";
            } else {
                listContainer.innerHTML = cart.map((item, index) => {
                    total += item.price * (item.qty || 1);
                    return `
                        <div class="cart-item">
                            <span>${item.name} (x${item.qty || 1}) - ${(item.price * (item.qty || 1)).toFixed(2)} €</span>
                            <button class="remove-btn" onclick="removeFromCart(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('cart-total-price').innerText = total.toFixed(2) + " €";
            badge.innerText = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
        }

        async function removeFromCart(index) {
            const item = cart[index];
            try {
                // Mapping για endpoints
                const endpoints = {
                    'Ducks': '/api/reserve-duck',
                    'Megabox Half Case': '/api/reserve-megabox',
                    'Panini La Liga Select Box': '/api/reserve-laliga',
                    'Panini EuroLeague Select Box': '/api/reserve-euroleague-select',
                    '2025-26 Panini EuroLeague Contenders Basketball Mega Box': '/api/reserve-euroleague'
                };
                
                if(endpoints[item.name]) {
                    await fetch(endpoints[item.name], { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({action: 'remove'}) 
                    });
                }
            } catch(e) { console.error("Error updating stock", e); }

            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCartSummary();
        }

        async function handleCheckout(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submit-order-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Επεξεργασία...";
            
            // Εδώ μπαίνει η λογική δημιουργίας παραγγελίας (Viva API)
            // Μετά την επιτυχή δημιουργία:
            localStorage.removeItem('cart');
            window.location.href = "success.html";
        }

        window.onload = loadCartSummary;
    </script>
</body>
</html>
