<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .right-side-panel a { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; }
        .right-side-panel a:hover { color: #ff0000; transform: scale(1.1); }

        /* CHECKOUT CONTAINER */
        .checkout-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .checkout-title { color: #ff0000; font-size: 32px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 30px; }
        
        .grid-layout { display: block; }
        
        /* CART SUMMARY & FORM BOXES */
        .box-panel { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .box-panel h2 { font-size: 20px; color: #ff0000; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; }

        /* CART ITEMS LIST */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); }
        .cart-item:last-child { border-bottom: none; }
        .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-top: 15px; padding-top: 15px; border-top: 2px solid #ff0000; }

        /* SHIPPING NOTIFICATION */
        .shipping-alert { background-color: rgba(255, 0, 0, 0.1); border-left: 4px solid #ff0000; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; line-height: 1.5; color: #e0e0e0; }
        .shipping-alert strong { color: #ff0000; }

        /* FORM INPUTS */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #cbd5e1; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; background-color: #0d1b2a; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; color: white; font-size: 15px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #ff0000; }

        /* TERMS CHECKBOX */
        .terms-group { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; font-size: 14px; color: #cbd5e1; }
        .terms-group input { width: 18px; height: 18px; cursor: pointer; accent-color: #ff0000; margin-top: 2px; }
        .terms-group a { color: #ff0000; text-decoration: none; font-weight: bold; }
        .terms-group a:hover { text-decoration: underline; }

        /* BUTTONS */
        .submit-btn { width: 100%; background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.1); }
        .submit-btn:hover { background-color: #ff0000; box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3); }
        
        .timer-banner { background-color: #ff0000; color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; display: none; margin-bottom: 20px; border-radius: 6px; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="#" title="Καλάθι Αγορών"><i class="fas fa-shopping-cart"></i></a>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav class="nav-left">
            <a href="products.html">ΠΑΚΕΤΑ</a>
            <a href="index.html">ΑΝΟΙΓΜΑΤΑ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav class="nav-right">
            <a href="terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
        </nav>
    </header>

    <main class="checkout-container">
        <h1 class="checkout-title">Ολοκληρωση Αγορας</h1>
        
        <div id="stock-timer" class="timer-banner"></div>

        <div class="shipping-alert">
            <i class="fas fa-exclamation-triangle" style="color: #ff0000; margin-right: 8px;"></i>
            <strong>ΠΡΟΣΟΧΗ:</strong> Τα έξοδα αποστολής (Shipping) υπολογίζονται <strong>ξεχωριστά</strong>. Αν δεν το έχετε κάνει ήδη, παρακαλούμε να προσθέσετε το προϊόν "Shipping" στο καλάθι σας πριν την ολοκλήρωση.
        </div>

        <div class="grid-layout">
            <div class="box-panel">
                <h2>Τα Προϊόντα σας</h2>
                <div id="cart-summary-list">
                    </div>
                <div class="cart-total">
                    <span>Σύνολο:</span>
                    <span id="cart-total-price">0.00 €</span>
                </div>
            </div>

            <div class="box-panel">
                <h2>Στοιχεία Πελάτη</h2>
                <form id="checkout-form" action="https://api.web3forms.com/submit" method="POST" onsubmit="return handleCheckout(event)">
                    <input type="hidden" name="access_key" value="ef54407f-a593-41c3-8fce-209c5ebf6e97">
                    <input type="hidden" name="order_items" id="hidden-order-items">
                    <input type="hidden" name="order_total" id="hidden-order-total">
                    <input type="hidden" name="subject" value="Νέα Παραγγελία από MinoanHobby!">

                    <div class="form-group">
                        <label for="firstname">Όνομα *</label>
                        <input type="text" id="firstname" name="Όνομα" required>
                    </div>

                    <div class="form-group">
                        <label for="lastname">Επώνυμο *</label>
                        <input type="text" id="lastname" name="Επώνυμο" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email (Gmail) *</label>
                        <input type="email" id="email" name="Email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Κινητό Τηλέφωνο *</label>
                        <input type="tel" id="phone" name="Κινητό" required>
                    </div>

                    <div class="terms-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Έχω διαβάσει και αποδέχομαι τους <a href="terms.html" target="_blank">Όρους και Προϋποθέσεις</a> του MinoanHobby.</label>
                    </div>

                    <button type="submit" class="submit-btn">Πληρωμη & Ολοκληρωση</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Δοκιμαστικά δεδομένα καλαθιού (Αντικαθίστανται αυτόματα από το δικό σου localStorage)
        let cart = JSON.parse(localStorage.getItem('cart')) || [
            { id: 101, name: "2023-24 Panini Select Euroleague Box", price: 20.00, qty: 1 }
        ];

        function loadCartSummary() {
            const listContainer = document.getElementById('cart-summary-list');
            let total = 0;

            if (cart.length === 0) {
                listContainer.innerHTML = "<p style='color:#e0e0e0;'>Το καλάθι σας είναι άδειο.</p>";
                return;
            }

            listContainer.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="cart-item">
                        <span>${item.name} (x${item.qty})</span>
                        <span style="font-weight: bold;">${(item.price * item.qty).toFixed(2)} €</span>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total-price').innerText = total.toFixed(2) + " €";
            
            // Πέρασμα των δεδομένων στα κρυφά πεδία του Web3Forms
            document.getElementById('hidden-order-items').value = cart.map(i => `${i.name} (x${i.qty})`).join(', ');
            document.getElementById('hidden-order-total').value = total.toFixed(2) + " €";
        }

        // Λογική Κράτησης Stock (10 Λεπτά)
        function startStockTimer() {
            const timerBanner = document.getElementById('stock-timer');
            let duration = 10 * 60; // 10 λεπτά σε δευτερόλεπτα

            // Αν υπάρχει ήδη αποθηκευμένος χρόνος έναρξης, συνεχίζει από εκεί
            if(!sessionStorage.getItem('timer_start')) {
                sessionStorage.setItem('timer_start', Date.now());
            } else {
                const elapsed = Math.floor((Date.now() - sessionStorage.getItem('timer_start')) / 1000);
                duration = duration - elapsed;
            }

            if (duration <= 0) {
                releaseStock();
                return;
            }

            timerBanner.style.display = 'block';

            const interval = setInterval(() => {
                let minutes = Math.floor(duration / 60);
                let seconds = duration % 60;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                timerBanner.innerHTML = `<i class="fas fa-clock"></i> Τα προϊόντα σας έχουν δεσμευτεί! Χρόνος για ολοκλήρωση: ${minutes}:${seconds}`;

                if (--duration < 0) {
                    clearInterval(interval);
                    releaseStock();
                }
            }, 1000);
        }

        function releaseStock() {
            alert("Ο χρόνος των 10 λεπτών έληξε! Το stock αποδεσμεύτηκε. Παρακαλώ ανανεώστε τη σελίδα.");
            sessionStorage.removeItem('timer_start');
            // Εδώ στέλνεις fetch αίτημα στο API σου αν θες να αλλάξει το status σε available
            window.location.reload();
        }

        // Διαχείριση Υποβολής και Ανακατεύθυνση στη Viva Payments
        async function handleCheckout(event) {
            event.preventDefault();

            // 1. Έλεγχος αν επιλέχθηκαν οι όροι
            if(!document.getElementById('terms').checked) {
                alert("Πρέπει να αποδεχτείτε τους όρους και τις προϋποθέσεις.");
                return false;
            }

            const form = document.getElementById('checkout-form');
            const formData = new FormData(form);

            try {
                // 2. Πρώτα στέλνουμε το email ειδοποίησης μέσω Web3Forms
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // 3. Αφού σταλεί με επιτυχία η φόρμα, καλείται το Backend API σου για τη Viva
                    const res = await fetch('/api/create-viva-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cart: cart })
                    });
                    
                    const data = await res.json();
                    
                    if(data.OrderCode) {
                        // Καθαρισμός καλαθιού και ανακατεύθυνση στο Checkout της Viva Wallet
                        localStorage.removeItem('cart');
                        sessionStorage.removeItem('timer_start');
                        window.location.href = `https://www.vivapayments.com/web/checkout?ref=${data.OrderCode}`;
                    } else {
                        alert(data.error || "Σφάλμα κατά τη δημιουργία της πληρωμής.");
                    }
                } else {
                    alert("Παρουσιάστηκε πρόβλημα με την καταχώρηση των στοιχείων.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Σφάλμα σύνδεσης. Δοκιμάστε ξανά.");
            }
        }

        window.onload = () => {
            loadCartSummary();
            if(cart.length > 0) {
                startStockTimer();
            }
        };
    </script>
</body>
</html>
