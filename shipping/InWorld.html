<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Εκτός Ελλάδος - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; position: relative; z-index: 10; }
        .main-header nav a { color: #e0e0e0; text-decoration: none; font-weight: 700; font-size: 14px; margin: 0 15px; letter-spacing: 1px; transition: color 0.3s; }
        .main-header nav a:hover { color: #ff0000; }
        .playful-logo { font-family: 'Comic Sans MS', 'Arial Round MT Bold', sans-serif; font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .playful-logo span { color: #ff0000; font-style: italic; display: inline-block; transform: rotate(-3deg); margin-left: 5px; }

        /* RIGHT SIDEBAR */
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0, 0, 0, 0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 0; z-index: 100; }
        .panel-top { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .panel-bottom { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .right-side-panel a, .right-side-panel .lang-selector { color: #e0e0e0; font-size: 18px; text-decoration: none; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .right-side-panel a:hover, .right-side-panel .lang-selector:hover { color: #ff0000; transform: scale(1.1); }
        .cart-container { position: relative; }
        .cart-count { background-color: #ff0000; color: white; padding: 2px 5px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -8px; right: -10px; }
        .lang-selector { font-size: 12px !important; font-weight: bold; text-align: center; line-height: 1.2; }

        /* PRODUCT CONTAINER */
        .product-container { max-width: 600px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .product-box { background-color: #0b132b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 40px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .product-icon { font-size: 50px; color: #ff0000; margin-bottom: 20px; }
        .product-title { font-size: 28px; color: #ffffff; margin-bottom: 15px; text-transform: uppercase; }
        .product-price { font-size: 36px; color: #ff0000; font-weight: bold; margin-bottom: 20px; }
        .product-desc { color: #cbd5e1; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        
        .add-btn { background-color: transparent; border: 2px solid #ff0000; color: #ffffff; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        .add-btn:hover { background-color: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <div class="panel-top">
            <a href="../checkout.html" title="Καλάθι Αγορών" class="cart-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="global-cart-count">0</span>
            </a>
            <div class="lang-selector" title="Αλλαγή Γλώσσας">
                🇬🇷<br>ΕΛ
            </div>
        </div>
        <div class="panel-bottom">
            <a href="https://www.instagram.com/minoanhobby/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@makisscharlie" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
    </aside>

    <header class="main-header">
        <nav class="nav-left">
            <a href="../products.html">ΠΑΚΕΤΑ</a>
            <a href="../index.html">ΑΝΟΙΓΜΑΤΑ</a>
            <a href="#">ΑΠΟΣΤΟΛΕΣ</a>
        </nav>
        <div class="playful-logo">Minoan<span>Hobby</span></div>
        <nav class="nav-right">
            <a href="../terms.html">ΟΡΟΙ & ΠΡΟΫΠΟΘΕΣΕΙΣ</a>
        </nav>
    </header>

    <main class="product-container">
        <div class="product-box">
            <div class="product-icon"><i class="fas fa-globe"></i></div>
            <h1 class="product-title">Shipping (International / Worldwide)</h1>
            <div class="product-price">15.90 €</div>
            <p class="product-desc">Έξοδα αποστολής για χώρες εκτός Ελλάδος (Διεθνείς αποστολές). Παρακαλούμε προσθέστε το στο καλάθι σας πριν την ολοκλήρωση της παραγγελίας.</p>
            <button class="add-btn" onclick="addToCart('Shipping (International)', 15.90)">Προσθηκη στο Καλαθι</button>
        </div>
    </main>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) badge.innerText = totalItems;
        }

        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                alert("Το Shipping έχει προστεθεί ήδη στο καλάθι σας!");
                return;
            } else {
                cart.push({ name: name, price: price, qty: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            alert("Το Shipping προστέθηκε επιτυχώς!");
        }

        window.onload = updateCartBadge;
    </script>
</body>
</html>
