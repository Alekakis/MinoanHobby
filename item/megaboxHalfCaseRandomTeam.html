<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megabox Random Team - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1b2a; color: #ffffff; font-family: sans-serif; padding-right: 60px; margin: 0; }
        .main-header { display: flex; justify-content: space-between; padding: 20px 40px; background: #0b132b; border-bottom: 2px solid #ff0000; }
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background: rgba(0,0,0,0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; z-index: 100; }
        .break-container { max-width: 800px; margin: 40px auto; text-align: center; }
        .stats-box { background: #0b132b; padding: 20px; border: 1px solid #ff0000; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        .buy-btn { background: #ff0000; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="right-side-panel">
        <a href="https://www.instagram.com/minoanhobby/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.youtube.com/@makisscharlie" target="_blank"><i class="fab fa-youtube"></i></a>
    </aside>

    <header class="main-header">
        <nav><a href="../products.html" style="color:white;">ΠΑΚΕΤΑ</a></nav>
        <div style="font-size:24px; font-weight:bold;">Minoan<span style="color:red;">Hobby</span></div>
    </header>

    <main class="break-container">
        <div id="break-config" data-total-price="27.49" data-max-slots="6"></div>

        <h1>Megabox Random Team</h1>
        <div class="stats-box">
            <p>Κόστος ανά θέση: <span id="price-display" style="color:#ff0000; font-weight:bold;"></span></p>
            <p>Πιθανότητα νίκης: <span id="prob-display" style="color:#ff0000; font-weight:bold;"></span></p>
        </div>

        <button class="buy-btn" onclick="buySlot()">ΑΓΟΡΑ ΘΕΣΗΣ</button>
    </main>

    <script>
        function calculateStats() {
            const config = document.getElementById('break-config');
            const total = parseFloat(config.dataset.totalPrice);
            const slots = parseInt(config.dataset.maxSlots);
            document.getElementById('price-display').innerText = (total / slots).toFixed(2) + " €";
            document.getElementById('prob-display').innerText = ((1 / slots) * 100).toFixed(1) + " %";
        }
        
        async function buySlot() {
            // Εδώ καλείς το API σου για να κρατήσεις τη θέση
            alert("Η θέση κρατήθηκε!");
        }

        window.onload = calculateStats;
    </script>
</body>
</html>
