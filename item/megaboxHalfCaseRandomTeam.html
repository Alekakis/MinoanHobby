<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megabox Random Break - MinoanHobby</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Χρησιμοποιούμε τα ίδια CSS που μου έστειλες για να είναι ομοιόμορφο */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; padding-right: 60px; }
        
        /* [ΕΔΩ ΒΑΖΕΙΣ ΤΑ ΙΔΙΑ CSS ΠΟΥ ΜΟΥ ΕΣΤΕΙΛΕΣ ΣΤΟ ΜΗΝΥΜΑ ΣΟΥ] */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #0b132b; border-bottom: 2px solid #ff0000; }
        .right-side-panel { position: fixed; top: 0; right: 0; width: 60px; height: 100vh; background-color: rgba(0,0,0,0.85); border-left: 2px solid #ff0000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; }
        
        .break-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .team-card { background: #0b132b; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 10px; }
        .team-card.sold { opacity: 0.3; filter: grayscale(1); }
        .logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        
        #buy-random-btn { 
            background: #ff0000; color: white; border: none; padding: 20px 40px; 
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; 
            margin-bottom: 30px; width: 100%; text-transform: uppercase;
        }
        #buy-random-btn:disabled { background: #555; }
    </style>
</head>
<body>

    <main class="break-container">
        <h1>Megabox Half Case - Random Team</h1>
        <p style="margin-bottom: 20px;">Αγοράστε ένα Random Slot (27.49€). Η ομάδα σας θα κληρωθεί αυτόματα!</p>
        
        <button id="buy-random-btn" onclick="buyRandom()">ΑΓΟΡΑ ΤΥΧΑΙΑΣ ΟΜΑΔΑΣ (27.49€)</button>

        <h2 class="teams-title">Διαθέσιμες Ομάδες στο Pool</h2>
        <div class="team-grid" id="teams-container"></div>
    </main>

    <script>
        const euroleagueTeams = [ /* Η λίστα σου με τα id και τα logo */ ];

        async function init() {
            const container = document.getElementById('teams-container');
            const res = await fetch('/api/get-slots'); 
            const slots = await res.json(); // Επιστρέφει {id, status}

            container.innerHTML = "";
            euroleagueTeams.forEach(team => {
                const slot = slots.find(s => s.id === team.id);
                const isSold = slot && (slot.status === 'sold' || slot.status === 'pending');
                
                container.innerHTML += `
                    <div class="team-card ${isSold ? 'sold' : ''}">
                        <img src="${team.logo}" class="logo">
                        <p>${team.name}</p>
                        <p>${isSold ? '<strong>ΕΞΑΝΤΛΗΘΗΚΕ</strong>' : 'ΔΙΑΘΕΣΙΜΟ'}</p>
                    </div>
                `;
            });
        }

        async function buyRandom() {
            const btn = document.getElementById('buy-random-btn');
            btn.disabled = true;
            btn.innerText = "ΔΕΣΜΕΥΣΗ ΟΜΑΔΑΣ...";

            const res = await fetch('/api/create-random-order', {
                method: 'POST',
                body: JSON.stringify({ amount: "27.49" })
            });
            const data = await res.json();
            if(data.OrderCode) {
                window.location.href = `https://www.vivapayments.com/web/checkout?ref=${data.OrderCode}`;
            } else {
                alert("Σφάλμα: " + data.error);
                btn.disabled = false;
                btn.innerText = "ΑΓΟΡΑ ΤΥΧΑΙΑΣ ΟΜΑΔΑΣ (27.49€)";
            }
        }

        init();
    </script>
</body>
</html>
