<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Megabox Random Team</title>
    <style>
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .team-card { border: 1px solid #444; padding: 10px; text-align: center; transition: 0.3s; }
        .sold { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .logo { width: 80px; height: 80px; object-fit: contain; }
    </style>
</head>
<body>

    <h1>Megabox Half Case - Random Team</h1>
    <button id="random-buy-btn" onclick="buyRandom()">Αγορά Random Ομάδας (27.49€)</button>

    <div class="team-grid" id="team-list">
        </div>

    <script>
        const euroleagueTeams = [/* Εδώ η λίστα σου */];

        async function init() {
            const container = document.getElementById('team-list');
            const response = await fetch('/api/get-slots'); // Χρησιμοποιούμε το API που έχουμε ήδη
            const statusList = await response.json();

            euroleagueTeams.forEach(team => {
                const status = statusList.find(s => s.id === team.id);
                const isSold = status && (status.status === 'sold' || status.status === 'pending');
                
                container.innerHTML += `
                    <div class="team-card ${isSold ? 'sold' : ''}">
                        <img src="${team.logo}" class="logo">
                        <p>${team.name}</p>
                    </div>
                `;
            });
        }
        
        async function buyRandom() {
            // Καλεί το API που φτιάξαμε για random αγορά
            const res = await fetch('/api/create-random-order', {
                method: 'POST',
                body: JSON.stringify({ amount: "27.49" })
            });
            const data = await res.json();
            if(data.OrderCode) window.location.href = `https://www.vivapayments.com/web/checkout?ref=${data.OrderCode}`;
        }

        init();
    </script>
</body>
</html>
